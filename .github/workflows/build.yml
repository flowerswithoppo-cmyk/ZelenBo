name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Create gradlew
        run: |
          cat > gradlew <<'EOF'
          #!/usr/bin/env sh
          set -e
          if [ -f "./gradle/wrapper/gradle-wrapper.jar" ]; then
            exec java -jar ./gradle/wrapper/gradle-wrapper.jar "$@"
          fi
          echo "gradle-wrapper.jar is missing, falling back to system gradle"
          exec gradle "$@"
          EOF
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Decode keystore (release signing)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "KEYSTORE_FILE=$PWD/release.keystore" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: zelenbo-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: zelenbo-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: zelenbo-release-apk
          path: release-apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-apk/*.apk
          generate_release_notes: true

